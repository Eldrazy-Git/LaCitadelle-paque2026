<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pâques 2026 – La Citadelle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Nunito:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet" />

  <template id="__bundler_thumbnail" data-bg-color="#1e2d3f">
    <svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
      <rect width="800" height="500" fill="#1e2d3f"/>
      <rect x="280" y="60" width="240" height="4" rx="2" fill="#aba36d" opacity="0.5"/>
      <text x="400" y="220" text-anchor="middle" font-family="serif" font-weight="900" font-size="110" fill="#ccc48e" opacity="0.9">P</text>
      <text x="400" y="300" text-anchor="middle" font-family="serif" font-size="28" fill="#aba36d" letter-spacing="8">PÂQUES 2026</text>
      <rect x="320" y="330" width="160" height="1" fill="#aba36d" opacity="0.35"/>
      <text x="400" y="365" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#7c8fa8" letter-spacing="4">LA CITADELLE</text>
    </svg>
  </template>

  <style>
    :root {
      --c-deep:    #1e2d3f;
      --c-navy:    #283852;
      --c-mid:     #40516d;
      --c-card:    #334460;
      --c-gold:    #aba36d;
      --c-gold-lt: #ccc48e;
      --c-gold-dk: #7a7450;
      --c-text:    #d6cfb4;
      --c-muted:   #7c8fa8;
      --c-border:  rgba(171,163,109,0.18);
      --r:         10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--c-deep);
      color: var(--c-text);
      font-family: 'Nunito', sans-serif;
      font-weight: 400;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HERO ────────────────────────────────────────── */
    .hero {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 3rem 2rem 4rem;
      overflow: hidden;
    }

    .hero-canvas {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 90% 55% at 50% 38%, rgba(171,163,109,0.07) 0%, transparent 65%),
        linear-gradient(175deg, #1a2840 0%, #1e2d3f 50%, #192436 100%);
      z-index: 0;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 720px;
    }

    .hero-tag {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--c-gold);
      background: rgba(171,163,109,0.1);
      border: 1px solid rgba(171,163,109,0.22);
      padding: 0.35em 1.1em;
      border-radius: 100px;
      margin-bottom: 2rem;
      opacity: 0;
      animation: rise 0.7s 0.2s forwards;
    }

    .hero-title {
      font-family: 'Cinzel', serif;
      font-weight: 900;
      font-size: clamp(3rem, 9vw, 7.5rem);
      line-height: 1;
      color: var(--c-gold-lt);
      letter-spacing: 0.01em;
      text-shadow: 0 2px 32px rgba(171,163,109,0.25), 0 1px 3px rgba(0,0,0,0.7);
      opacity: 0;
      animation: rise 0.8s 0.45s forwards;
    }

    .hero-sub {
      font-family: 'Cinzel', serif;
      font-weight: 400;
      font-size: clamp(0.9rem, 2vw, 1.15rem);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--c-muted);
      margin-top: 0.6rem;
      opacity: 0;
      animation: rise 0.7s 0.7s forwards;
    }

    .hero-line {
      width: 120px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--c-gold), transparent);
      margin: 2.2rem auto;
      opacity: 0;
      animation: rise 0.7s 0.9s forwards;
    }

    .hero-desc {
      font-size: clamp(0.9rem, 1.8vw, 1.05rem);
      font-weight: 300;
      color: var(--c-muted);
      line-height: 1.75;
      max-width: 440px;
      margin: 0 auto 3rem;
      font-style: italic;
      opacity: 0;
      animation: rise 0.7s 1.1s forwards;
    }

    .hero-cta {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.82rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-weight: 600;
      color: var(--c-gold);
      opacity: 0;
      animation: rise 0.7s 1.4s forwards;
      text-decoration: none;
      transition: color 0.2s;
    }

    .hero-cta svg {
      width: 16px; height: 16px;
      stroke: currentColor; fill: none;
      animation: bob 2s 2s infinite;
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(5px); }
    }

    /* ── NAV BAR ─────────────────────────────────────── */
    nav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(30,45,63,0.88);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--c-border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 52px;

    .nav-logo {
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: 0.95rem;

      letter-spacing: 0.08em;

      color: var(--c-muted);
      letter-spacing: 0.1em;

    .nav-count span {
      color: var(--c-gold);
      font-weight: 600;

    /* ── GALLERY ─────────────────────────────────────── */

      max-width: 1480px;
      margin: 0 auto;
      padding: 3.5rem 1.5rem 5rem;
    }

    .masonry {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }

    .photo-item {
      margin-bottom: 0;
      border-radius: var(--r);
      overflow: hidden;
      cursor: pointer;
      position: relative;
      background: var(--c-card);
      border: 1px solid transparent;
      transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;

    .photo-item:hover {
      border-color: rgba(171,163,109,0.35);
      transform: translateY(-3px);
      box-shadow: 0 16px 44px rgba(0,0,0,0.45);
    }

    .photo-item img {
      width: 100%;
      height: auto;
      display: block;
      transition: brightness 0.25s;
    }

    .photo-item:hover img { filter: brightness(1.06); }

    .photo-foot {
      position: absolute;
      inset: auto 0 0;
      background: linear-gradient(to top, rgba(30,45,63,0.9) 0%, transparent 100%);
      padding: 1.6rem 0.85rem 0.75rem;
      opacity: 0;
      transition: opacity 0.25s;
    }

    .photo-item:hover .photo-foot { opacity: 1; }

    .photo-caption {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--c-gold-lt);
      letter-spacing: 0.04em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .photo-zoom {
      position: absolute;
      top: 8px; right: 8px;
      width: 30px; height: 30px;
      border-radius: 6px;
      background: rgba(30,45,63,0.72);
      border: 1px solid rgba(171,163,109,0.3);
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity 0.2s, background 0.2s;
      backdrop-filter: blur(4px);
    }

    .photo-item:hover .photo-zoom { opacity: 1; }
    .photo-zoom:hover { background: rgba(171,163,109,0.18); }
    .photo-zoom svg { width: 13px; height: 13px; stroke: var(--c-gold); fill: none; }

    /* ── STATES ──────────────────────────────────────── */
    .state-box {
      text-align: center;
      padding: 4.5rem 2rem;
      border: 1px dashed rgba(171,163,109,0.15);
      border-radius: 14px;
      background: rgba(171,163,109,0.02);
      max-width: 520px;
      margin: 0 auto;
    }

    .state-box h3 {
      font-family: 'Cinzel', serif;
      font-size: 1.05rem;
      color: var(--c-gold);
      margin-bottom: 0.65rem;
    }

    .state-box p {
      font-size: 0.88rem;
      color: var(--c-muted);
      line-height: 1.7;
    }

    .state-box code {
      background: rgba(171,163,109,0.1);
      color: var(--c-gold-lt);
      padding: 0.15em 0.45em;
      border-radius: 4px;
      font-size: 0.83em;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 2.5px solid rgba(171,163,109,0.15);
      border-top-color: var(--c-gold);
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
      margin: 0 auto 1.2rem;
    }

    /* ── LIGHTBOX ────────────────────────────────────── */
    .lb {
      position: fixed; inset: 0;
      z-index: 200;
      background: rgba(20,30,44,0.95);
      backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: center;
      padding: 2rem;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }

    .lb.on { opacity: 1; pointer-events: all; }

    .lb-inner {
      position: relative;
      transform: scale(0.94);
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }

    .lb.on .lb-inner { transform: scale(1); }

    .lb-inner img {
      max-width: min(92vw, 1200px);
      max-height: 82vh;
      border-radius: 10px;
      display: block;
      border: 1px solid rgba(171,163,109,0.22);
      box-shadow: 0 30px 80px rgba(0,0,0,0.75);
    }

    .lb-caption {
      text-align: center;
      margin-top: 0.9rem;
      font-family: 'Cinzel', serif;
      font-size: 0.82rem;
      color: var(--c-gold);
      letter-spacing: 0.12em;
    }

    .lb-fullscreen {
      position: absolute;
      top: -13px; left: -13px;
      width: 34px; height: 34px;
      border-radius: 50%;
      background: var(--c-mid);
      border: 1px solid rgba(171,163,109,0.3);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
    }

    .lb-fullscreen:hover { background: var(--c-gold-dk); }
    .lb-fullscreen svg { width: 13px; height: 13px; stroke: var(--c-gold-lt); fill: none; }

    /* mode image plein écran */

      max-width: 100vw;
      max-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .lb.fullimg .lb-inner img {
      max-width: 98vw;
      max-height: 93vh;
      border-radius: 6px;
    }

    .lb.fullimg .lb-btn.prev { left: 10px; }
    .lb.fullimg .lb-btn.next { right: 10px; }
    .lb.fullimg .lb-close { top: 10px; right: 10px; position: fixed; }
    .lb.fullimg .lb-fullscreen { top: 10px; left: 10px; position: fixed; }

    .lb-close {
      position: absolute;
      top: -13px; right: -13px;
      width: 34px; height: 34px;
      border-radius: 50%;
      background: var(--c-mid);
      border: 1px solid rgba(171,163,109,0.3);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
    }

    .lb-close:hover { background: var(--c-gold-dk); }
    .lb-close svg { width: 13px; height: 13px; stroke: var(--c-gold-lt); fill: none; }

    .lb-btn {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      width: 42px; height: 42px;
      border-radius: 50%;
      background: rgba(40,56,82,0.85);
      border: 1px solid rgba(171,163,109,0.3);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; backdrop-filter: blur(4px);
      transition: background 0.2s, border-color 0.2s;
    }

    .lb-btn:hover { background: rgba(171,163,109,0.15); border-color: var(--c-gold); }
    .lb-btn svg { width: 17px; height: 17px; stroke: var(--c-gold-lt); fill: none; }
    .lb-btn.prev { left: -21px; }
    .lb-btn.next { right: -21px; }

    /* ── FOOTER ──────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--c-border);
      padding: 2rem;
      text-align: center;
      font-size: 0.78rem;
      letter-spacing: 0.07em;
      color: var(--c-muted);
    }

    footer a { color: var(--c-gold-dk); text-decoration: none; transition: color 0.2s; }
    footer a:hover { color: var(--c-gold); }

    /* ── KEYFRAMES ───────────────────────────────────── */
    @keyframes rise {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RESPONSIVE ──────────────────────────────────── */
    @media (max-width: 520px) {
      .masonry { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .lb-btn.prev { left: -8px; }
      .lb-btn.next { right: -8px; }
    }
  </style>
</head>

<!-- ══ PARTICLES ═════════════════════════════════════ -->
<script>
(function () {
  const canvas = document.getElementById('particleCanvas');
  const ctx = canvas.getContext('2d');
  let W, H, pts = [];

  const COLS = ['#aba36d','#ccc48e','#7a7450','#40516d','#283852'];

  function resize() {
    W = canvas.width  = canvas.offsetWidth;
    H = canvas.height = canvas.offsetHeight;
  }

  function mk() {
    return {
      x: Math.random() * W,
      y: H + 20,
      r: Math.random() * 1.8 + 0.3,
      vy: Math.random() * 0.35 + 0.1,
      vx: (Math.random() - 0.5) * 0.2,
      a: Math.random() * 0.45 + 0.08,
      col: COLS[Math.floor(Math.random() * COLS.length)],
      tw: Math.random() * Math.PI * 2,
      ts: Math.random() * 0.018 + 0.004,
    };
  }

  function init() {
    resize();
    pts = [];
    const n = Math.floor(W * H / 11000);
    for (let i = 0; i < n; i++) { const p = mk(); p.y = Math.random() * H; pts.push(p); }
  }

  function frame() {
    ctx.clearRect(0, 0, W, H);
    for (let i = 0; i < pts.length; i++) {
      const p = pts[i];
      p.y -= p.vy; p.x += p.vx; p.tw += p.ts;
      const a = p.a * (0.55 + 0.45 * Math.sin(p.tw));
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.col + Math.round(a * 255).toString(16).padStart(2, '0');
      ctx.fill();
      if (p.y < -8) pts[i] = mk();
    }
    requestAnimationFrame(frame);
  }

  window.addEventListener('resize', resize);
  init(); frame();
})();
</script>

<script>
const GITHUB_USER   = "Eldrazy-Git";
const GITHUB_REPO   = "LaCitadelle-paque2026";
const IMAGES_FOLDER = "images";

const SUPPORTED = /\.(png|jpe?g|gif|webp|avif)$/i;

const masonry   = document.getElementById('masonry');
const navCount  = document.getElementById('navCount');
let IMAGES = [];
let cur = 0;

function setState(html) { masonry.innerHTML = `<div style="column-span:all">${html}</div>`; }

function showLoading() {
  setState(`<div class="state-box"><div class="spinner"></div><h3>Chargement…</h3><p>Récupération des images depuis GitHub.</p></div>`);
}

function showError(msg) {
  setState(`<div class="state-box"><h3>Erreur</h3><p>${msg}</p></div>`);
}

function showEmpty() {
  setState(`<div class="state-box"><h3>La galerie attend vos aventures</h3><p>Aucune image dans <code>${IMAGES_FOLDER}/</code>. Déposez vos screenshots et rechargez !</p></div>`);
}

async function load() {
  if (GITHUB_USER === "votre-username") {
    setState(`<div class="state-box"><h3>Configuration requise</h3><p>Renseignez <code>GITHUB_USER</code> et <code>GITHUB_REPO</code> dans le fichier <code>index.html</code>.</p></div>`);
    return;
  }
  showLoading();
  try {
    const r = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${IMAGES_FOLDER}`, {
      headers: { Accept: "application/vnd.github+json" }
    });
    if (r.status === 404) { showEmpty(); return; }
    if (!r.ok) { const d = await r.json().catch(() => ({})); showError(`GitHub API ${r.status} : ${d.message || 'Vérifiez que le dépôt est public.'}`); return; }
    const files = await r.json();
    IMAGES = files
      .filter(f => f.type === "file" && SUPPORTED.test(f.name))
      .sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }))
      .map(f => ({ src: f.download_url, caption: f.name.replace(/\.[^.]+$/, '').replace(/[-_]+/g, ' ') }));
    build();
  } catch (e) { showError(`Erreur réseau : ${e.message}`); }
}

function build() {
  if (!IMAGES.length) { showEmpty(); return; }
  masonry.innerHTML = '';
  navCount.innerHTML = `<span>${IMAGES.length}</span> photo${IMAGES.length > 1 ? 's' : ''}`;
  IMAGES.forEach((img, i) => {
    const el = document.createElement('div');
    el.className = 'photo-item';
    el.innerHTML = `
      <img src="${img.src}" alt="${img.caption}" loading="lazy" />
      <div class="photo-foot"><span class="photo-caption">${img.caption}</span></div>
      <div class="photo-zoom">
        <svg viewBox="0 0 24 24" stroke-width="2">
          <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
          <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </div>`;
    el.addEventListener('click', () => open(i));
    masonry.appendChild(el);
  });
}

// ── Lightbox ─────────────────────────────────────────
const lb       = document.getElementById('lb');
const lbImg    = document.getElementById('lbImg');
const lbCap    = document.getElementById('lbCaption');
const lbClose  = document.getElementById('lbClose');
const lbPrev   = document.getElementById('lbPrev');
const lbNext   = document.getElementById('lbNext');

function open(i) { cur = i; sync(); lb.classList.add('on'); document.body.style.overflow = 'hidden'; }
function close() { lb.classList.remove('on'); lb.classList.remove('fullimg'); isFullImg = false; lbFullscreen.innerHTML = `<svg viewBox="0 0 24 24" stroke-width="2" fill="none"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>`; document.body.style.overflow = ''; }

function sync() {
  lbImg.src = IMAGES[cur].src;
  lbImg.alt = IMAGES[cur].caption;
  lbCap.textContent = IMAGES[cur].caption;
  lbPrev.style.display = cur === 0 ? 'none' : 'flex';
  lbNext.style.display = cur === IMAGES.length - 1 ? 'none' : 'flex';
}

lbClose.addEventListener('click', close);
lb.addEventListener('click', e => { if (e.target === lb) close(); });
lbPrev.addEventListener('click', e => { e.stopPropagation(); if (cur > 0) { cur--; sync(); } });
lbNext.addEventListener('click', e => { e.stopPropagation(); if (cur < IMAGES.length - 1) { cur++; sync(); } });

const lbFullscreen = document.getElementById('lbFullscreen');
let isFullImg = false;

lbFullscreen.addEventListener('click', e => {
  e.stopPropagation();
  isFullImg = !isFullImg;
  lb.classList.toggle('fullimg', isFullImg);
  lbFullscreen.innerHTML = isFullImg
    ? `<svg viewBox="0 0 24 24" stroke-width="2" fill="none"><path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/></svg>`
    : `<svg viewBox="0 0 24 24" stroke-width="2" fill="none"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>`;
});


document.addEventListener('keydown', e => {
  if (!lb.classList.contains('on')) return;
  if (e.key === 'Escape') close();
  if (e.key === 'ArrowLeft' && cur > 0) { cur--; sync(); }
  if (e.key === 'ArrowRight' && cur < IMAGES.length - 1) { cur++; sync(); }
});

load();
</script>

</body>
</html>
